name: Deploy GitHub Pages

on:
  schedule:
    # Rebuild every 2 hours. V3 pushes to main constantly — decoupling
    # the Pages build from push events permanently eliminates build spam.
    - cron: '0 */2 * * *'
  workflow_dispatch:  # CIO can manually trigger a rebuild anytime

# Only one deployment runs at a time.
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
