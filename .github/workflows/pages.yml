name: Deploy GitHub Pages

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p /tmp/site
          rsync -a --exclude='bluelotus-v3/' --exclude='.git/' --exclude='.github/' . /tmp/site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "/tmp/site"

      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment1.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment2
        if: steps.deployment1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deployment1.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment
        if: steps.deployment1.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
